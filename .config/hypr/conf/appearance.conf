general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    # Pastel pink primary color for active border
    col.active_border = rgba(f5b8c6cc) rgba(aec6cfcc) 45deg
    col.inactive_border = rgba(3d3552aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 8
        passes = 3
        new_optimizations = on
        ignore_opacity = on
    }
}

# Blur waybar
layerrule = blur on, match:namespace waybar
# Blur wlogout
layerrule = blur on, match:namespace logout_dialog
# Blur swaync
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
# Blur wofi
layerrule = blur on, match:namespace wofi
