background {
    path = screenshot
    blur_passes = 3
    blur_size = 6
    color = rgba(1e1a2eee)
}

input-field {
    size = 250, 45
    outline_thickness = 2
    dots_size = 0.3
    dots_space = 0.5
    dots_center = true
    outer_color = rgba(f5b8c6cc)
    inner_color = rgba(1e1a2ecc)
    font_color = rgb(242, 232, 245)
    hide_input = false
    rounding = 8
    check_color = rgba(fffaa0cc)
    fail_color = rgba(f5b8b8cc)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    placeholder_text = <span foreground="##f5b8c6">Password</span>
    position = 0, -80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$TIME"
    color = rgba(f2e8f5ee)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
}

label {
    text = cmd[update:86400000] echo "$(date '+%A, %B %d')"
    color = rgba(aec6cfee)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
}
