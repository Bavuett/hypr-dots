# Spring pastel light color scheme for kitty terminal
#----------------------------------------------------

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor                  #f5b8c6
cursor_text_color       #fff7f3
cursor_shape            block
cursor_blink_interval   0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
copy_on_select  no

# Window
window_padding_width    12
window_padding_height   12
background_opacity      0.82
dynamic_background_color no

# Tab bar
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{title}"
active_tab_foreground   #fff7f3
active_tab_background   #f5b8c6
active_tab_font_style   bold
inactive_tab_foreground #3d2f47
inactive_tab_background #f7d9e5
inactive_tab_font_style normal
tab_bar_background      #ffe8ef

# Spring pastel light color palette
# background / foreground
background              #fff7f3
foreground              #221828

# Selection
selection_background    #f5b8c6
selection_foreground    #fff7f3

# Black / dark gray tones  (usati come "nero" nel terminale)
color0  #3d2f47
color8  #5a4d60

# Normal colors (1=red 2=green 3=yellow 4=blue 5=magenta 6=cyan 7=white)
color1  #8f2d3a
color2  #1e5233
color3  #7a5020
color4  #244b58
color5  #7a2e44
color6  #1a434c
color7  #3d2f47

# Bright colors
color9  #bf3d4f
color10 #3a8a5e
color11 #9e6828
color12 #4a8596
color13 #c9507a
color14 #3a7d8a
color15 #1e1526

# Keyboard shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
