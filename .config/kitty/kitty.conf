# Pastel color scheme for kitty terminal
#---------------------------------------

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor                  #f5b8c6
cursor_text_color       #1e1a2e
cursor_shape            block
cursor_blink_interval   0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
copy_on_select  no

# Window
window_padding_width    12
window_padding_height   12
background_opacity      0.92
dynamic_background_color no

# Tab bar
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{title}"
active_tab_foreground   #1e1a2e
active_tab_background   #f5b8c6
active_tab_font_style   bold
inactive_tab_foreground #f2e8f5
inactive_tab_background #3d3552
inactive_tab_font_style normal
tab_bar_background      #1e1a2e

# Pastel color palette
# background / foreground
background              #1e1a2e
foreground              #f2e8f5

# Selection
selection_background    #f5b8c6
selection_foreground    #1e1a2e

# Cursor colors
color0  #1e1a2e
color8  #4a4a5e

# Normal colors
color1  #f5b8b8
color2  #b8f5c6
color3  #fffaa0
color4  #aec6cf
color5  #f5b8c6
color6  #aec6cf
color7  #f2e8f5

# Bright colors
color9  #f5b8c6
color10 #b8f5c6
color11 #fffaa0
color12 #aec6cf
color13 #c9b8f5
color14 #aec6cf
color15 #ffffff

# Keyboard shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
